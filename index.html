<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babibird Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#10262B;
    --navy-light:#193C43;
    --sand:#EFE7D8;
    --sand-dark:#E2D6BE;
    --mango:#F2A93B;
    --mango-dark:#D6910F;
    --teal:#1F6F78;
    --stamp:#C1443C;
    --ink:#152024;
    --white:#FBF8F2;
    --green:#3F7A56;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'IBM Plex Sans Thai',sans-serif;
    min-height:100vh;
  }
  .app{max-width:1080px;margin:0 auto;padding:18px 16px 60px;}

  /* ===== Header : boarding pass strip ===== */
  .header{
    background:var(--navy);
    color:var(--white);
    border-radius:14px;
    padding:18px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    position:relative;
    overflow:hidden;
    border:1px solid var(--ink);
  }
  .header::after{
    content:'';
    position:absolute;
    right:-40px;top:-40px;
    width:140px;height:140px;
    border-radius:50%;
    background:radial-gradient(circle,var(--mango) 0%,transparent 70%);
    opacity:.25;
  }
  .brand{display:flex;flex-direction:column;gap:2px;z-index:1;}
  .brand .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    color:var(--mango);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:900;
    font-size:30px;
    letter-spacing:.02em;
    margin:0;
    line-height:1;
  }
  .header .route{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    text-align:right;
    color:var(--sand);
    z-index:1;
  }

  /* ===== Tabs styled as gates ===== */
  .gates{
    display:flex;
    gap:8px;
    margin-top:16px;
    flex-wrap:wrap;
  }
  .gate-btn{
    flex:1;
    min-width:130px;
    background:var(--white);
    border:1px solid var(--ink);
    border-radius:10px;
    padding:10px 12px;
    cursor:pointer;
    font-family:'IBM Plex Sans Thai',sans-serif;
    font-weight:600;
    font-size:13px;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:2px;
    transition:transform .12s ease, background .12s ease;
  }
  .gate-btn .gate-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:.1em;
    color:var(--teal);
    text-transform:uppercase;
  }
  .gate-btn.active{
    background:var(--navy);
    color:var(--white);
  }
  .gate-btn.active .gate-label{color:var(--mango);}
  .gate-btn:hover{transform:translateY(-2px);}

  .panel{
    background:var(--white);
    border:1px solid var(--ink);
    border-radius:14px;
    padding:20px;
    margin-top:16px;
  }
  .panel h2{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;
    font-size:22px;
    margin:0 0 4px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel .sub{
    font-size:13px;
    color:#5c6b6d;
    margin-bottom:16px;
  }

  button.primary{
    background:var(--mango);
    border:1px solid var(--ink);
    color:var(--ink);
    font-weight:700;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-family:'IBM Plex Sans Thai',sans-serif;
    font-size:14px;
  }
  button.primary:hover{background:var(--mango-dark);}
  button.primary:disabled{opacity:.5;cursor:wait;}
  button.ghost{
    background:transparent;
    border:1px solid var(--ink);
    color:var(--ink);
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-family:'IBM Plex Sans Thai',sans-serif;
    font-size:13px;
  }
  button.danger{
    background:transparent;
    border:1px solid var(--stamp);
    color:var(--stamp);
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
  }
  input[type=text], input[type=date], textarea, select{
    width:100%;
    font-family:'IBM Plex Sans Thai',sans-serif;
    font-size:14px;
    padding:9px 10px;
    border:1px solid #b9b2a2;
    border-radius:8px;
    background:var(--sand);
    color:var(--ink);
  }
  textarea{resize:vertical;min-height:80px;}
  label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row > .field{flex:1;min-width:160px;}

  /* ===== Calendar ===== */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-nav .month-label{
    font-family:'Big Shoulders Display',sans-serif;
    font-size:24px;font-weight:800;color:var(--navy);
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{
    text-align:center;font-size:11px;font-weight:700;color:var(--teal);
    font-family:'IBM Plex Mono',monospace;text-transform:uppercase;padding:4px 0;
  }
  .cal-day{
    background:var(--sand);
    border:1px solid #d8cfba;
    border-radius:8px;
    min-height:86px;
    padding:6px;
    cursor:pointer;
    display:flex;flex-direction:column;gap:4px;
  }
  .cal-day.empty{background:transparent;border:none;cursor:default;}
  .cal-day.today{border:2px solid var(--mango);}
  .cal-day .num{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;font-size:16px;color:var(--ink);
  }
  .stub{
    position:relative;
    background:var(--white);
    border:1px solid var(--ink);
    border-radius:5px;
    padding:3px 6px;
    font-size:10.5px;
    font-weight:600;
    display:flex;align-items:center;gap:4px;
    overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis;

  .stub .dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .dot.tiktok{background:var(--ink);}
  .dot.youtube{background:var(--stamp);}
  .more-link{font-size:10px;color:var(--teal);font-weight:700;cursor:pointer;}

    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    padding:2px 8px;
    border-radius:20px;
    display:inline-block;
    border:1px solid var(--ink);
    text-transform:uppercase;
  }
  .status-idea{background:#eee;}
  .status-writing{background:#FDE9C8;}
  .status-filming{background:#CFE7EA;}
  .status-editing{background:#E4D6F5;}
  .status-posted{background:var(--green);color:white;}

  /* ===== Modal ===== */
  .overlay{
    position:fixed;inset:0;background:rgba(16,38,43,.55);
    display:flex;align-items:center;justify-content:center;
    z-index:50;padding:16px;
  }
  .modal{
    background:var(--white);border-radius:14px;border:1px solid var(--ink);
    max-width:480px;width:100%;padding:20px;max-height:90vh;overflow:auto;
  }
  .modal h3{font-family:'Big Shoulders Display',sans-serif;font-size:20px;margin:0 0 12px;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:16px;gap:8px;}

  /* ticket stub big card (used in day-list modal & elsewhere) */
  .ticket{
    display:flex;background:var(--white);border:1px solid var(--ink);border-radius:10px;overflow:hidden;margin-bottom:10px;
  }
  .ticket .tleft{flex:1;padding:10px 12px;}
  .ticket .tright{
    width:90px;background:var(--navy);color:var(--white);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px;position:relative;
    border-left:2px dashed var(--sand);
  }
  .ticket .tright::before, .ticket .tright::after{
    content:'';position:absolute;left:-8px;width:14px;height:14px;background:var(--sand);border-radius:50%;
  }
  .ticket .tright::before{top:-7px;}
  .ticket .tright::after{bottom:-7px;}
  .ticket .platform{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;}

  /* ===== hook cards ===== */
  .hook-card{
    border:1px solid var(--ink);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--sand);
  }
  .hook-card .htype{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal);text-transform:uppercase;font-weight:700;
  }
  .hook-card p{margin:6px 0 0;font-size:14px;}

  .loading{
    display:flex;align-items:center;gap:8px;font-size:13px;color:var(--teal);font-weight:600;
  }
  .spinner{
    width:14px;height:14px;border:2px solid var(--sand-dark);border-top-color:var(--teal);
    border-radius:50%;animation:spin .7s linear infinite;
  }

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:var(--white);padding:10px 18px;border-radius:30px;

  }

  details.bible summary{cursor:pointer;font-weight:700;color:var(--navy);font-size:13px;margin-bottom:8px;}

  .stat-cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .stat-card{
    flex:1;min-width:130px;background:var(--navy);color:var(--white);border-radius:10px;padding:12px 14px;
  }
  .stat-card .val{font-family:'Big Shoulders Display',sans-serif;font-size:26px;font-weight:800;color:var(--mango);}
  .stat-card .lbl{font-size:11px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}

  table.top{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
  table.top th, table.top td{border-bottom:1px solid var(--sand-dark);padding:6px 8px;text-align:left;}
  table.top th{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;color:var(--teal);}

  .ai-output{
    background:var(--sand);border:1px solid var(--ink);border-radius:10px;padding:14px;margin-top:14px;
    font-size:14px;line-height:1.6;white-space:pre-wrap;
  }

  /* ===== script timeline ===== */
  .timeline{border-left:3px solid var(--ink);padding-left:0;margin-left:6px;}
  .seg-row{
    display:flex;gap:12px;position:relative;padding:0 0 18px 18px;
  }
  .seg-row::before{
    content:'';position:absolute;left:-9px;top:2px;width:14px;height:14px;border-radius:50%;
    border:2px solid var(--ink);background:var(--white);
  }
  .seg-row.seg-start::before{background:var(--mango);}
  .seg-row.seg-mid::before{background:var(--teal);}
  .seg-row.seg-end::before{background:var(--stamp);}
  .seg-time{
    flex:none;width:78px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--navy);
    padding-top:1px;
  }
  .seg-body{
    flex:1;background:var(--white);border:1px solid var(--ink);border-radius:8px;padding:8px 12px;
  }
  .seg-part{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--teal);font-weight:700;margin-bottom:3px;
  }
  .seg-voice{font-size:14px;line-height:1.5;}
  .seg-visual{font-size:12px;color:#5c6b6d;margin-top:5px;font-style:italic;}

  /* ===== thumbnails for uploaded images / extracted frames ===== */
  .thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .thumb{
    position:relative;width:96px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--ink);
    background:var(--ink);
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb-remove{
    position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;
    background:var(--stamp);color:white;border:none;font-size:12px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0;
  }
  .thumb-time{
    position:absolute;bottom:2px;left:2px;background:rgba(16,38,43,.75);color:var(--white);
    font-family:'IBM Plex Mono',monospace;font-size:10px;padding:1px 5px;border-radius:4px;
  }
  @media(max-width:640px){
    .gate-btn{min-width:44%;font-size:12px;}
    .header{flex-direction:column;align-items:flex-start;}
    .header .route{text-align:left;}
  }
</style>

<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============== STORAGE HELPERS ============== */
async function safeGet(key, fallback){
  try{
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function safeSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value)); return true; }
  catch(e){ console.error('storage set failed', e); return false; }
}

/* ============== TOAST ============== */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============== CLAUDE API HELPER ============== */
async function callClaude(systemPrompt, userText, opts={}){
  let content = userText;
  if(opts.images && opts.images.length){
    content = [
      ...opts.images.map(img=>({ type:"image", source:{ type:"base64", media_type: img.mediaType, data: img.data } })),
      { type:"text", text: userText }
    ];
  }
  const body = {
    model: "claude-sonnet-4-6",
    max_tokens: opts.maxTokens || 1000,
    system: systemPrompt,
    messages: [{ role: "user", content }]
  };
  if(opts.webSearch){
    body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  }

  const maxAttempts = 3;
  let lastErr = null;
  for(let attempt=1; attempt<=maxAttempts; attempt++){
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if(!res.ok){
        const errText = await res.text().catch(()=> '');
        throw new Error(`API ตอบกลับผิดพลาด (สถานะ ${res.status}) ${errText.slice(0,200)}`);
      }
      const data = await res.json();
      if(data.error){
        throw new Error(data.error.message || 'API คืนค่า error');
      }
      const text = (data.content || []).filter(b=>b.type==="text").map(b=>b.text).join("\n\n");
      return text || "(ไม่ได้รับคำตอบ ลองใหม่อีกครั้ง)";
    }catch(err){
      lastErr = err;
      const isNetworkErr = err.message === 'Failed to fetch' || err instanceof TypeError;
      if(attempt < maxAttempts && isNetworkErr){
        await new Promise(r=>setTimeout(r, 700 * attempt));
        continue;
      }
      break;
    }
  }
  const friendly = (lastErr && lastErr.message === 'Failed to fetch')
    ? 'เชื่อมต่อเครือข่ายไม่สำเร็จหลังลองหลายครั้ง ลองกดปุ่มใหม่อีกทีนะครับ'
    : (lastErr ? lastErr.message : 'เกิดข้อผิดพลาดที่ไม่ทราบสาเหตุ');
  throw new Error(friendly);
}
function tryParseJSON(text){
  let clean = text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  try{ return JSON.parse(clean); }catch(e){ return null; }
}
function parseDataUrl(dataUrl){
  const m = dataUrl.match(/^data:(.+?);base64,(.*)$/);
  if(!m) return null;
  return { mediaType: m[1], data: m[2] };
}
function extractVideoFrames(file, frameCount=6){
  return new Promise((resolve, reject)=>{
    const video = document.createElement('video');
    video.preload = 'auto';
    video.muted = true;
    video.style.display = 'none';
    video.src = URL.createObjectURL(file);
    document.body.appendChild(video);

    const cleanup = ()=>{ URL.revokeObjectURL(video.src); video.remove(); };

    video.onloadedmetadata = ()=>{
      const duration = video.duration;
      const canvas = document.createElement('canvas');
      canvas.width = 360;
      const times = [];
      for(let i=0;i<frameCount;i++){ times.push((duration*(i+0.5))/frameCount); }
      let idx = 0;
      const frames = [];
      function next(){
        if(idx >= times.length){ cleanup(); resolve(frames); return; }
        video.currentTime = times[idx];
      }
      video.onseeked = ()=>{
        canvas.height = Math.round(canvas.width * (video.videoHeight/video.videoWidth || 0.5625));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frames.push({ time: times[idx], dataUrl: canvas.toDataURL('image/jpeg', 0.7) });
        idx++;
        next();
      };
      next();
    };
    video.onerror = ()=>{ cleanup(); reject(new Error('อ่านไฟล์วิดีโอไม่สำเร็จ')); };
  });
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = Math.round(sec%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ============== DEFAULTS ============== */
const DEFAULT_STYLE_BIBLE = `สไตล์การเขียนของช่อง Babibird:
- ใช้ภาษาไทยแบบพูดคุยเป็นกันเอง ผสมคำทับศัพท์ภาษาอังกฤษที่คนไทยใช้จริง (hook, content, vibe, worth it)
- ประโยคสั้น กระชับ อ่านลื่น ไม่ยืดเยื้อ
- ใช้สรรพนามบุรุษที่ 1 "ผม" ตลอดสคริปต์
- โทนเหมือนเล่าเรื่องให้เพื่อนฟัง เป็นกันเอง จริงใจ ไม่ยัดเยียดขาย
- คอนเทนต์แนว "รีวิวตรงไปตรงมา" ช่วยคนลังเลตัดสินใจก่อนไปเที่ยว
- ชอบใช้มุม Contrarian Hook ตั้งคำถามท้าทายความเชื่อทั่วไป

ลักษณะการพูดจริงจากคลิปต้นฉบับ (ใช้เป็นน้ำเสียงอ้างอิง):
- เปิดคลิปด้วยประโยคทิ้งปมกวนๆ ก่อนเข้าเรื่อง เช่น ตั้งคำถามแล้วบอกว่า "เดี๋ยวเล่าให้ฟัง" ก่อนค่อยอธิบายจริง
- ใช้คำลงท้าย "นะครับ" แทรกกลางประโยคบ่อยๆ ให้ฟังเป็นกันเองเหมือนคุยสด ไม่ได้อ่านสคริปต์
- ช่วงกลางอธิบายเป็นขั้นเป็นตอน ลงรายละเอียดที่จับต้องได้ (สเปก ตัวเลข ขั้นตอน) แทรกมุกหรือคำอุทานเล็กๆ ระหว่างพูด
- บางคลิปมีลักษณะเป็นบทสนทนาสั้นๆ กับคนอื่น (ถาม-ตอบ) แทรกระหว่างเล่าเรื่อง ทำให้ดูเป็นธรรมชาติ ไม่ใช่พูดคนเดียวตลอด
- ปิดท้ายด้วยการทิ้งปมต่อยอดไปเรื่องถัดไป หรือจบด้วยมุกกวนๆ/ปัญหาที่ยังไม่จบ มากกว่าจะสรุปเป็นทางการ`;

const DEFAULT_HOOK_FRAMEWORKS = `Hook Frameworks ที่ใช้ประจำ:
1. Contrarian Hook — ท้าทายความเชื่อทั่วไป เช่น "ทุกคนบอกว่าอย่าไปหน้าฝน แต่..."
2. Curiosity Gap — เปิดด้วยผลลัพธ์ที่ทำให้อยากรู้ที่มา เช่น "ผมเกือบไม่ได้กินอันนี้ แต่มันเปลี่ยนทริปทั้งหมด"
3. Pain Point / Relatable — พูดถึงปัญหาที่คนดูกำลังเจอ เช่น "ถ้ากำลังลังเลว่าจะไปหน้านี้ดีไหม..."

CTA Frameworks ตามเป้าหมาย:

Pacing 60 วิสำหรับ TikTok:
0-3s Hook, 3-15s Setup, 15-45s Payoff, 45-60s CTA/loop back`;

const DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function renderCalendar(){
  const y = state.calYear, m = state.calMonth;
  const firstDow = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = state.items.filter(it=>it.date===dateStr);
    const shown = dayItems.slice(0,2);
    const extra = dayItems.length - shown.length;
    cells += `<div class="cal-day ${dateStr===todayStr?'today':''}" data-date="${dateStr}">
      <div class="num">${d}</div>
      ${shown.map(it=>`<div class="stub" data-item="${it.id}"><span class="dot ${it.platform}"></span>${escapeHtml(it.title)}</div>`).join('')}
      ${extra>0 ? `<div class="more-link" data-date="${dateStr}">+${extra} เพิ่มเติม</div>` : ''}
    </div>`;
  }

  return `
    <div class="panel">
      <h2>📋 ปฏิทินคอนเทนต์</h2>
      <div class="sub">วางแผนว่าวันไหนทำอะไร คลิกวันที่เพื่อเพิ่มคอนเทนต์ใหม่</div>
      <div class="cal-nav">
        <button class="ghost" id="prevMonth">← เดือนก่อน</button>
        <div class="month-label">${MONTHS[m]} ${y+543}</div>
        <button class="ghost" id="nextMonth">เดือนถัดไป →</button>
      </div>
      <div class="cal-grid">
        ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

}

}

async function generateScript(){
  const topic = document.getElementById('scriptTopic').value.trim();
  if(!topic){ toast('ใส่หัวข้อก่อนนะครับ'); return; }
  const duration = parseInt(document.getElementById('scriptDuration').value, 10);
  const goal = document.getElementById('scriptGoal').value;
  const goalLabel = {follow:'ให้ Follow',comment:'ให้ Comment',save:'ให้ Save',watch:'ให้ดูจนจบ'}[goal];

  state.scriptLoading = true; state.scriptResult = null; render();

  const ctaStart = Math.max(duration - Math.round(duration*0.15), duration-8);

  const system = `คุณเป็นผู้ช่วยเขียนสคริปต์คอนเทนต์ท่องเที่ยวสำหรับ TikTok ให้ครีเอเตอร์ชื่อ Babibird
${state.styleBible}

${state.hookFrameworks}

${state.productionNotes}

กำหนดความยาวรวมของคลิป: ${duration} วินาทีพอดี (TikTok เท่านั้น)

ให้แบ่งสคริปต์ออกเป็นช่วงเวลาที่ชัดเจน (segments) ครอบคลุมตั้งแต่ 0:00 ถึง 0:${String(duration).padStart(2,'0')} โดยไม่มีช่วงเวลาขาดหายหรือเกินความยาวที่กำหนด อย่างน้อย 4 ช่วง ตามสัดส่วนนี้:
- ช่วงต้น (Hook): วินาทีที่ 0 ถึงประมาณวินาทีที่ 3
- ช่วงต้น (Setup): ต่อจาก Hook ถึงประมาณ 20-25% ของความยาวคลิป
- ช่วงกลาง (Payoff): ตั้งแต่ท้าย Setup จนถึงประมาณวินาทีที่ ${ctaStart}
- ช่วงท้าย (CTA): ตั้งแต่วินาทีที่ ${ctaStart} ถึงจบคลิปที่วินาทีที่ ${duration}

แต่ละช่วงต้องระบุ:
- time: ช่วงเวลาแบบ "0:00-0:03" (นาที:วินาที)
- part: ระบุว่าเป็น "ช่วงต้น (Hook)", "ช่วงต้น (Setup)", "ช่วงกลาง (Payoff)", หรือ "ช่วงท้าย (CTA)"
- voiceover: บทพูดของผมในช่วงนั้น (ภาษาพูด กระชับ)
- visual: คำแนะนำภาพ/มุมกล้อง/การแตกช็อตในช่วงนั้น

ตอบกลับเป็น JSON เท่านั้น ห้ามมีข้อความอื่นหรือ markdown code fence นอกเหนือจาก JSON โครงสร้างนี้:
{"hooks":[{"type":"ชื่อ framework","text":"ตัวอย่างประโยค hook"}, ... อย่างน้อย 3 แบบ],"segments":[{"time":"0:00-0:03","part":"ช่วงต้น (Hook)","voiceover":"...","visual":"..."}, ...ครบทุกช่วงจนจบคลิป],"cta":"คำแนะนำ CTA พร้อมตัวอย่างประโยค"}`;

  const userMsg = `หัวข้อ: ${topic}
แพลตฟอร์ม: TikTok ความยาว ${duration} วินาที
เป้าหมาย CTA: ${goalLabel}`;

  try{
    const text = await callClaude(system, userMsg, { maxTokens: 3000 });
    const parsed = tryParseJSON(text);
    state.scriptResult = parsed || { raw: text };
  }catch(e){
    state.scriptResult = { raw: 'เกิดข้อผิดพลาด ลองใหม่อีกครั้งครับ: ' + e.message };
  }
  state.scriptLoading = false;
  render();
}

      <div class="stat-card"><div class="val">${formatNum(a.totalViews)}</div><div class="lbl">ยอดวิวรวม</div></div>
      <div class="stat-card"><div class="val">${formatNum(a.avgViews)}</div><div class="lbl">วิวเฉลี่ย/คลิป</div></div>
      <div class="stat-card"><div class="val">${a.engagementRate!=null ? a.engagementRate+'%' : '-'}</div><div class="lbl">Engagement Rate</div></div>
    </div>
    ${a.hasDateSeries ? `<canvas id="trendChart" height="90"></canvas>` : ''}
    ${a.topRows && a.topRows.length ? `
      <table class="top">
        <thead><tr><th>คลิป</th><th>วิว</th></tr></thead>
        <tbody>${a.topRows.map(r=>`<tr><td>${escapeHtml(r.title)}</td><td>${formatNum(r.views)}</td></tr>`).join('')}</tbody>
      </table>` : ''}
  `;
}
function formatNum(n){ if(n==null||isNaN(n)) return '-'; return Number(n).toLocaleString('en-US'); }

function findCol(headers, keywords){
  const lower = headers.map(h=>h.toLowerCase());
  for(const kw of keywords){
    const idx = lower.findIndex(h=>h.includes(kw));
    if(idx>-1) return headers[idx];
  }
  return null;
}

function handleCsvUpload(file){
  Papa.parse(file, {
    header:true,
    skipEmptyLines:true,
    complete: (results)=>{
      const rows = results.data;
      if(!rows.length){ toast('อ่านไฟล์ไม่สำเร็จ หรือไฟล์ว่าง'); return; }
      const headers = results.meta.fields;
      const viewCol = findCol(headers, ['view']);
      const likeCol = findCol(headers, ['like']);
      const commentCol = findCol(headers, ['comment']);
      const shareCol = findCol(headers, ['share']);
      const titleCol = findCol(headers, ['title','video','name','post']);
      const dateCol = findCol(headers, ['date','time','published']);

      const num = v => { const n = parseFloat(String(v).replace(/,/g,'')); return isNaN(n)?0:n; };
      let totalViews=0, totalLikes=0, totalComments=0, totalShares=0;
      const parsedRows = rows.map(r=>({
        title: titleCol ? r[titleCol] : '(ไม่ทราบชื่อ)',
        views: viewCol ? num(r[viewCol]) : 0,
        likes: likeCol ? num(r[likeCol]) : 0,
        comments: commentCol ? num(r[commentCol]) : 0,
        shares: shareCol ? num(r[shareCol]) : 0,
        date: dateCol ? r[dateCol] : null
      }));
      parsedRows.forEach(r=>{ totalViews+=r.views; totalLikes+=r.likes; totalComments+=r.comments; totalShares+=r.shares; });

      const avgViews = rows.length ? Math.round(totalViews/rows.length) : 0;
      const engagementRate = totalViews ? +(( (totalLikes+totalComments+totalShares) / totalViews)*100).toFixed(2) : null;
      const topRows = [...parsedRows].sort((a,b)=>b.views-a.views).slice(0,5);
      const hasDateSeries = !!dateCol;

      state.analytics = {
        rowCount: rows.length, totalViews, avgViews, engagementRate, topRows, hasDateSeries,
        seriesData: hasDateSeries ? parsedRows.filter(r=>r.date).sort((a,b)=>new Date(a.date)-new Date(b.date)) : null
      };
      render();
      if(hasDateSeries){ setTimeout(drawTrendChart, 50); }
      toast('อ่านไฟล์สำเร็จ');
    },
    error: ()=> toast('อ่านไฟล์ไม่สำเร็จ')
  });
}

let chartInstance = null;
function drawTrendChart(){
  const canvas = document.getElementById('trendChart');
  if(!canvas || !state.analytics.seriesData) return;
  if(chartInstance) chartInstance.destroy();
  const data = state.analytics.seriesData;
  chartInstance = new Chart(canvas, {
    type:'line',
    data:{
      labels: data.map(d=>d.date),
      datasets:[{ label:'วิว', data: data.map(d=>d.views), borderColor:'#1F6F78', backgroundColor:'rgba(31,111,120,0.15)', fill:true, tension:.3 }]
    },
    options:{ plugins:{legend:{display:false}}, scales:{ x:{ticks:{maxTicksLimit:8}} } }
  });
}

async function runTrendAI(){
  state.trendLoading = true; state.trendResult = null; render();
  const a = state.analytics;
  const summary = a ? `สรุปข้อมูลช่อง: จำนวนคลิป ${a.rowCount}, ยอดวิวรวม ${a.totalViews}, วิวเฉลี่ย ${a.avgViews}, engagement rate ${a.engagementRate}%. คลิปที่วิวสูงสุด: ${a.topRows.map(r=>r.title+' ('+r.views+' วิว)').join(', ')}.`
    : 'ยังไม่มีข้อมูลสถิติช่องอัปโหลดเป็น CSV';

  const hasImages = state.trendImages.length > 0;
  const imageNote = hasImages ? `\nมีการแนบรูป screenshot หน้า analytics มาด้วย ${state.trendImages.length} รูป ให้อ่านตัวเลขจากรูปประกอบการวิเคราะห์ด้วย` : '';

  const system = `คุณเป็นนักวิเคราะห์เทรนด์คอนเทนต์ท่องเที่ยวสำหรับครีเอเตอร์ไทยชื่อ Babibird (คอนเทนต์แนวรีวิวตรงไปตรงมา ลง TikTok)
${state.styleBible}
ให้วิเคราะห์เป็นภาษาไทย กระชับ แบ่งเป็นหัวข้อ: 1) ภาพรวมผลงานช่องตอนนี้ (อ้างอิงตัวเลขจากข้อมูล/รูปที่ให้มา) 2) เทรนด์คอนเทนต์ท่องเที่ยวที่กำลังมาแรงตอนนี้ 3) แนวโน้มที่น่าจะมาในอนาคตอันใกล้ 4) คำแนะนำหัวข้อคลิปที่ควรทำต่อไป 3 อย่าง`;

  const images = state.trendImages.map(src=>parseDataUrl(src)).filter(Boolean);

  try{
    const text = await callClaude(system, summary + imageNote, { webSearch:true, maxTokens: 1500, images });
    state.trendResult = text;
  }catch(e){
    state.trendResult = 'เกิดข้อผิดพลาด: ' + e.message;
  }
  state.trendLoading = false;
  render();
}

/* ============== CLIP CRITIQUE TAB ============== */

  return `<div class="panel">
    <h2>🧐 วิจารณ์คลิป</h2>
    <div class="sub">อัปโหลดไฟล์วิดีโอที่ทำเสร็จแล้วได้เลย ระบบจะแกะเฟรมจากคลิปมาให้ AI ดูภาพจริงประกอบการวิจารณ์ หรือจะวางสคริปต์ข้อความอย่างเดียวก็ได้</div>

    <div class="field">
      <label>อัปโหลดไฟล์วิดีโอ (แกะเฟรมอัตโนมัติ)</label>
      <input type="file" id="clipVideoFile" accept="video/*">
    </div>
    ${state.critiqueExtracting ? `<div class="loading" style="margin:8px 0"><span class="spinner"></span>กำลังแกะเฟรมจากวิดีโอ...</div>` : ''}
    ${state.critiqueFrames.length ? `
      <div class="thumb-row">
        ${state.critiqueFrames.map(f=>`
          <div class="thumb">
            <img src="${f.dataUrl}">
            <span class="thumb-time">${fmtTime(f.time)}</span>
          </div>
        `).join('')}
      </div>
      <div class="sub" style="margin-top:6px">แกะมาแล้ว ${state.critiqueFrames.length} เฟรมจาก "${escapeHtml(state.critiqueVideoName||'')}"</div>
    ` : ''}

    <div class="field" style="margin-top:12px"><label>สคริปต์ / บทพูด (แนบเพิ่มได้ ไม่บังคับถ้ามีวิดีโอแล้ว)</label>
      <textarea id="critiqueInput" rows="8" placeholder="วางสคริปต์เต็ม หรือสรุปเนื้อหาคลิปที่นี่..."></textarea>
    </div>
    <button class="primary" id="runCritique" ${state.critiqueLoading?'disabled':''}>
      ${state.critiqueLoading ? 'กำลังวิจารณ์...' : '🧠 วิจารณ์คลิปนี้'}
    </button>
    ${state.critiqueLoading ? `<div class="loading" style="margin-top:10px"><span class="spinner"></span>กำลังวิเคราะห์คลิป...</div>` : ''}
    ${state.critiqueResult ? `<div class="ai-output">${escapeHtml(state.critiqueResult)}</div>` : ''}
  </div>`;
}

async function runCritique(){
  const input = document.getElementById('critiqueInput').value.trim();
  const hasFrames = state.critiqueFrames.length > 0;
  if(!input && !hasFrames){ toast('อัปโหลดวิดีโอ หรือวางสคริปต์ก่อนนะครับ'); return; }
  state.critiqueLoading = true; state.critiqueResult = null; render();

  const system = `คุณเป็นบรรณาธิการคอนเทนต์ที่ช่วยวิจารณ์คลิปให้ครีเอเตอร์ท่องเที่ยว Babibird
${state.styleBible}
${state.hookFrameworks}
${state.productionNotes}
วิจารณ์เป็นภาษาไทย กระชับ ตรงไปตรงมา แบ่งเป็นหัวข้อ:
1) จุดแข็ง
2) จุดที่ควรปรับปรุง (ระบุจุดเสี่ยงที่คนดูจะเลื่อนผ่าน)
3) คะแนน Hook คำพูด และ Visual Hook (1-10 แยกกัน) พร้อมเหตุผลสั้นๆ
4) การตัดสลับมุมกล้อง/แตกช็อต ถี่พอที่จะรักษาความสนใจไหม
5) CTA ที่ใช้อยู่ดีหรือไม่ ควรปรับเป็นอะไร
6) ข้อเสนอแนะการเขียนใหม่แบบสั้นๆ 1-2 ตัวอย่าง`;

  const frameNote = hasFrames ? `แนบภาพเฟรมจากคลิปมาให้ดู ${state.critiqueFrames.length} เฟรม เรียงตามลำดับเวลาในคลิป (${state.critiqueFrames.map(f=>fmtTime(f.time)).join(', ')}) ให้วิจารณ์ภาพ/มุมกล้อง/การจัดองค์ประกอบจากเฟรมเหล่านี้ประกอบด้วย\n` : '';
  const userText = frameNote + (input ? `สคริปต์/บทพูด:\n${input}` : 'ไม่มีสคริปต์แนบ ให้วิจารณ์จากภาพเฟรมเป็นหลัก');
  const images = hasFrames ? state.critiqueFrames.map(f=>parseDataUrl(f.dataUrl)).filter(Boolean) : [];

  try{
    const text = await callClaude(system, userText, { maxTokens: 1500, images });
    state.critiqueResult = text;
  }catch(e){
    state.critiqueResult = 'เกิดข้อผิดพลาด: ' + e.message;
  }
  state.critiqueLoading = false;
  render();
}

/* ============== EVENT HANDLERS ============== */
function attachHandlers(){
  document.querySelectorAll('.gate-btn').forEach(btn=>{
    btn.onclick = ()=>{ state.tab = btn.dataset.tab; render(); };
  });

  // Calendar
  const prevM = document.getElementById('prevMonth');
  const nextM = document.getElementById('nextMonth');
  if(prevM) prevM.onclick = ()=>{ state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} render(); };
  if(nextM) nextM.onclick = ()=>{ state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} render(); };

  document.querySelectorAll('.cal-day[data-date]').forEach(cell=>{
    cell.addEventListener('click', (e)=>{
      if(e.target.closest('.stub') || e.target.closest('.more-link')) return;
      state.modal = { type:'edit', date: cell.dataset.date };
      render();
    });
  });
  document.querySelectorAll('.stub[data-item]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation();
      const item = state.items.find(it=>it.id===el.dataset.item);
      state.modal = { type:'edit', item };
      render();
    };
  });
  document.querySelectorAll('.more-link[data-date]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation();
      state.modal = { type:'daylist', date: el.dataset.date };
      render();
    };
  });

  // Modal
  const closeBtn = document.getElementById('closeModal');
  if(closeBtn) closeBtn.onclick = ()=>{ state.modal=null; render(); };
  const overlay = document.getElementById('overlay');
  if(overlay) overlay.addEventListener('click', (e)=>{ if(e.target.id==='overlay'){ state.modal=null; render(); } });

  const addNewForDay = document.getElementById('addNewForDay');
  if(addNewForDay) addNewForDay.onclick = ()=>{ state.modal = { type:'edit', date: state.modal.date }; render(); };

  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.onclick = ()=>{ const item = state.items.find(it=>it.id===el.dataset.edit); state.modal = { type:'edit', item }; render(); };
  });

  const saveBtn = document.getElementById('saveItem');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const title = document.getElementById('f-title').value.trim();
    if(!title){ toast('ใส่ชื่อคลิปก่อนนะครับ'); return; }
    const existing = state.modal.item;
    const newItem = {
      id: existing ? existing.id : uid(),
      date: document.getElementById('f-date').value,
      platform: document.getElementById('f-platform').value,
      title,
      status: document.getElementById('f-status').value,
      hook: document.getElementById('f-hook').value,
      cta: document.getElementById('f-cta').value,
      notes: document.getElementById('f-notes').value
    };
    if(existing){
      state.items = state.items.map(it=>it.id===existing.id?newItem:it);
    }else{
      state.items.push(newItem);
    }
    await safeSet('content-items', state.items);
    state.modal = null;
    render();
    toast('บันทึกแล้ว');
  };
  const delBtn = document.getElementById('deleteItem');
  if(delBtn) delBtn.onclick = async ()=>{
    state.items = state.items.filter(it=>it.id!==state.modal.item.id);
    await safeSet('content-items', state.items);
    state.modal = null;
    render();
    toast('ลบแล้ว');
  };

  // Style bible
  const saveBible = document.getElementById('saveBible');
  if(saveBible) saveBible.onclick = async ()=>{
    state.styleBible = document.getElementById('styleBibleInput').value;
    state.hookFrameworks = document.getElementById('hookFrameworksInput').value;
    state.productionNotes = document.getElementById('productionNotesInput').value;
    await safeSet('style-bible', state.styleBible);
    await safeSet('hook-frameworks', state.hookFrameworks);
    await safeSet('production-notes', state.productionNotes);
    toast('บันทึก Style Bible แล้ว');
  };

  // Script generator
  const genBtn = document.getElementById('generateScript');
  if(genBtn) genBtn.onclick = generateScript;
  const saveScriptToCal = document.getElementById('saveScriptToCal');
  if(saveScriptToCal) saveScriptToCal.onclick = async ()=>{
    const r = state.scriptResult;
    const item = {
      id: uid(), date: new Date().toISOString().slice(0,10), platform:'tiktok',
      title: document.getElementById('scriptTopic') ? document.getElementById('scriptTopic').value.trim() || 'คอนเทนต์ใหม่' : 'คอนเทนต์ใหม่',
      status:'writing', hook: r.hooks && r.hooks[0] ? r.hooks[0].text : '', cta: r.cta || '', notes: segmentsToText(r.segments)
    };
    state.items.push(item);
    await safeSet('content-items', state.items);
    toast('บันทึกลงปฏิทินแล้ว');
  };

  // Trend
  const csvFile = document.getElementById('csvFile');
  if(csvFile) csvFile.onchange = (e)=>{ if(e.target.files[0]) handleCsvUpload(e.target.files[0]); };
  const trendImgFile = document.getElementById('trendImgFile');
  if(trendImgFile) trendImgFile.onchange = (e)=>{
    const files = Array.from(e.target.files||[]);
    let pending = files.length;
    if(!pending) return;
    files.forEach(file=>{
      const reader = new FileReader();
      reader.onload = ()=>{ state.trendImages.push(reader.result); render(); };
      reader.readAsDataURL(file);
    });
  };
  document.querySelectorAll('[data-remove-trend-img]').forEach(btn=>{
    btn.onclick = ()=>{ state.trendImages.splice(parseInt(btn.dataset.removeTrendImg,10),1); render(); };
  });
  const runTrend = document.getElementById('runTrendAI');
  if(runTrend) runTrend.onclick = runTrendAI;
  if(state.analytics && state.analytics.hasDateSeries) setTimeout(drawTrendChart, 50);

  // Critique
  const clipVideoFile = document.getElementById('clipVideoFile');
  if(clipVideoFile) clipVideoFile.onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    state.critiqueExtracting = true; state.critiqueFrames = []; state.critiqueVideoName = file.name; render();
    try{
      const frames = await extractVideoFrames(file, 6);
      state.critiqueFrames = frames;
    }catch(err){
      toast('แกะเฟรมจากวิดีโอไม่สำเร็จ: ' + err.message);
    }
    state.critiqueExtracting = false;
    render();
  };
  const runCrit = document.getElementById('runCritique');
  if(runCrit) runCrit.onclick = runCritique;
}

loadState();
</script>
